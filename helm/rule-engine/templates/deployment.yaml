apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rule-engine.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rule-engine.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "rule-engine.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rule-engine.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.nodeName }}
      nodeName: {{ .Values.nodeName }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      hostNetwork: {{ .Values.hostNetwork }}
      dnsPolicy: {{ .Values.dnsPolicy }}

      restartPolicy: Always

      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: rule-engine
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/rule-engine"]
          args:
            - --config-file=/etc/rule-engine/config.yaml
            - --v={{ .Values.logLevel }}

          ports:
            - name: http
              containerPort: {{ .Values.httpPort }}
              protocol: TCP

          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.httpPort }}
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.httpPort }}
            initialDelaySeconds: 5
            periodSeconds: 10

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          volumeMounts:
            - name: rule-engine-config
              mountPath: /etc/rule-engine

      volumes:
        - name: rule-engine-config
          configMap:
            name: {{ include "rule-engine.configmapName" . }}
            items:
              - key: config.yaml
                path: config.yaml
